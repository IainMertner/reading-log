        <div class="add-book-actions">

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getBooks, addBook, addFinishedBook, updateBookProgress, finishBook, deleteBook, unfinishBook, updateBookRating, updateBookDates, updateBookCover, updateShelf, getProfileByUsername } from '../js/firebase.js';

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';

    let viewMode = localStorage.getItem('library-view') || 'grid';

    function makeBookListRow(book) {
      const el = document.createElement('div');
      el.dataset.title  = (book.title  || '').toLowerCase();
      el.dataset.author = (book.author || '').toLowerCase();
      el.style.cssText  = 'display:flex;align-items:center;padding:.35rem 0;border-bottom:1px solid var(--border);cursor:pointer;min-width:0;overflow:hidden';
      const author  = book.author ? `<span style="color:var(--text-muted);font-weight:400"> · ${esc(book.author)}</span>` : '';
      const stars   = book.rating ? `<span style="flex-shrink:0;margin-left:.5rem">${renderStars(book.rating)}</span>` : '';
      el.innerHTML  = `<div style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.875rem;font-weight:600">${esc(book.title)}${author}</div>${stars}`;
      return el;
    }

    async function hcPost(query, variables) {
      const r = await fetch(HARDCOVER_PROXY, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      return r.json();
    }

    const { user, profile } = await requireAuth();

    const params   = new URLSearchParams(location.search);
    const viewUser = params.get('u')?.toLowerCase();
    const isOwn    = !viewUser;

    const readingList  = document.getElementById('reading-list');
    const finishedList = document.getElementById('finished-list');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      p.textContent = msg;
      container.appendChild(p);
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function createStarPicker(initial) {
      const wrap = document.createElement('div');
      wrap.className = 'star-picker';
      let value = initial || 0;
      const btns = [];

      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-pick-btn';
        btn.textContent = '★';
        btn.dataset.i = i;
        btns.push(btn);
        wrap.appendChild(btn);
      }

      function update(v) {
        value = v;
        btns.forEach((b, idx) => {
          const n = idx + 1;
          b.classList.remove('full', 'half');
          if (value >= n)          b.classList.add('full');
          else if (value >= n-0.5) b.classList.add('half');
        });
      }

      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.star-pick-btn');
        if (!btn) return;
        const i    = parseInt(btn.dataset.i);
        const half = e.offsetX < btn.offsetWidth / 2;
        const v    = half ? i - 0.5 : i;
        update(v === value ? 0 : v);
      });

      wrap.getValue = () => value || null;
      update(value);
      return wrap;
    }

    const TRASH_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

    function cellRatingHtml(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          stars += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) stars += '<span class="star-char half">★</span>';
        else                      stars += '<span class="star-char">★</span>';
      }
      const num = Number.isInteger(rating) ? String(rating) : rating.toFixed(1);
      return `<span class="rating-stars-full">${stars}</span><span class="rating-stars-compact">★ ${num}</span>`;
    }

    function bookCoverHtml(book) {
      const inner = book.coverUrl
        ? `<img class="book-cover book-cover-img" src="${esc(book.coverUrl)}" alt="">`
        : `<div class="book-cover">📖</div>`;
      return `<div class="book-cover-wrap">${inner}</div>`;
    }

    function coverInnerHtml(book) {
      return book.coverUrl
        ? `<img class="book-cover book-cover-img" src="${esc(book.coverUrl)}" alt="">`
        : `<div class="book-cover">📖</div>`;
    }

    function makeBookCoverCell(book) {
      const cell = document.createElement('div');
      cell.className = 'library-cover-cell';
      cell.dataset.id     = book.id;
      cell.dataset.title  = (book.title  || '').toLowerCase();
      cell.dataset.author = (book.author || '').toLowerCase();
      if (book.coverUrl) {
        const img = document.createElement('img');
        img.src = book.coverUrl; img.alt = '';
        cell.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'library-cover-placeholder';
        ph.textContent = '📖';
        cell.appendChild(ph);
      }
      if (book.status === 'reading' && book.totalPages) {
        const pct = Math.round((book.currentPage / book.totalPages) * 100);
        const strip = document.createElement('div');
        strip.className = 'library-progress-strip';
        const fill = document.createElement('div');
        fill.className = 'library-progress-fill';
        fill.style.width = pct + '%';
        strip.appendChild(fill);
        cell.appendChild(strip);
      }
      const info = document.createElement('div');
      info.className = 'library-cover-info';
      if (book.rating) {
        const badge = document.createElement('div');
        badge.className = 'library-cover-rating';
        badge.innerHTML = cellRatingHtml(book.rating);
        info.appendChild(badge);
      }
      const titleEl = document.createElement('div');
      titleEl.className = 'library-cover-title';
      titleEl.textContent = book.title;
      info.appendChild(titleEl);
      cell.appendChild(info);
      return cell;
    }

    function createBookModal(cardEl) {
      const overlay = document.createElement('div');
      overlay.className = 'book-modal-overlay';
      const inner = document.createElement('div');
      inner.className = 'book-modal-inner';
      inner.appendChild(cardEl);
      overlay.appendChild(inner);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.addEventListener('keydown', function onEsc(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onEsc); }
      });
      document.body.appendChild(overlay);
      return overlay;
    }

    function attachReadingCell(cell, book) {
      cell.addEventListener('click', () => {
        let overlay;
        const card = renderReading(book, cell, () => overlay?.remove());
        overlay = createBookModal(card);
      });
    }

    function attachFinishedCell(cell, book) {
      cell.addEventListener('click', () => {
        let overlay;
        const card = renderFinished(book, cell, () => overlay?.remove());
        overlay = createBookModal(card);
      });
    }

    async function openCoverPicker(book, wrapEl, coverCell) {
      const overlay = document.createElement('div');
      overlay.className = 'cover-picker-overlay';
      const modal = document.createElement('div');
      modal.className = 'cover-picker-modal';
      modal.innerHTML = `<div style="font-weight:600;margin-bottom:.2rem">${esc(book.title)}</div>
        <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.875rem">Choose an edition cover</div>
        <div class="cover-picker-grid" id="cpg"><span style="font-size:.85rem;color:var(--text-muted)">Loading…</span></div>`;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

      const grid = modal.querySelector('#cpg');

      function bestCoverUrl(url) {
        if (!url) return url;
        // OpenLibrary: upgrade S or M thumbnails to L
        url = url.replace(/-(S|M)\.jpg(\?|$)/, '-L.jpg$2');
        return url;
      }

      try {
        let editions = [];

        // Search by title to get multiple book IDs (catches different publisher entries)
        const searchData = await hcPost(
          `query($q:String!){search(query:$q,query_type:"Book",per_page:8){results}}`,
          { q: book.title }
        );
        const hits = searchData?.data?.search?.results?.hits || [];
        const bookIds = [...new Set(hits.map(h => h.document?.id).filter(Boolean).map(id => parseInt(id, 10)).filter(n => !isNaN(n)))];

        // If the stored gbid is a slug (not numeric), resolve it to an ID too
        const slug = /^\d+$/.test(book.gbid) ? '' : (book.gbid || '');
        if (slug) {
          const d = await hcPost(
            `query($s:String!){books(where:{slug:{_eq:$s}},limit:1){id}}`,
            { s: slug }
          );
          const id = d?.data?.books?.[0]?.id;
          if (id && !bookIds.includes(id)) bookIds.push(id);
        }

        if (bookIds.length) {
          const d = await hcPost(
            `query($ids:[Int!]!){editions(where:{book_id:{_in:$ids}},limit:100){id image{url width height} publisher{name} release_year}}`,
            { ids: bookIds }
          );
          const seen = new Set();
          editions = (d?.data?.editions || []).filter(e => {
            if (!e.image?.url) return false;
            // Filter out low-res covers (width known and too small for a shelf)
            if (e.image.width && e.image.width < 180) return false;
            const url = bestCoverUrl(e.image.url);
            if (seen.has(url)) return false;
            seen.add(url);
            e.image.url = url;
            return true;
          });
        }

        grid.innerHTML = '';

        const currentUrl = book.coverUrl || null;
        const filteredEditions = editions.filter(e => e.image.url !== currentUrl);

        async function pickCover(url) {
          if (url === book.coverUrl) { overlay.remove(); return; }
          await updateBookCover(user.uid, book.id, url);
          book.coverUrl = url;
          wrapEl.innerHTML = coverInnerHtml(book);
          // Sync the grid cell cover
          if (coverCell) {
            const existImg = coverCell.querySelector('img:not(.book-cover-img)');
            const existPh  = coverCell.querySelector('.library-cover-placeholder');
            if (existImg) { existImg.src = url; }
            else {
              const img = document.createElement('img');
              img.src = url; img.alt = '';
              existPh ? existPh.replaceWith(img) : coverCell.prepend(img);
            }
          }
          if (profile.shelf?.some(s => s.gbid === book.gbid && book.gbid)) {
            const updatedShelf = profile.shelf.map(s =>
              s.gbid === book.gbid ? { ...s, coverUrl: url } : s
            );
            await updateShelf(user.uid, updatedShelf);
            profile.shelf = updatedShelf;
            const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
            if (cached.shelf) { cached.shelf = updatedShelf; localStorage.setItem('rl_profile', JSON.stringify(cached)); }
          }
          overlay.remove();
        }

        // Current cover first (selected state)
        if (currentUrl) {
          const item = document.createElement('div');
          item.className = 'cover-picker-item selected';
          item.title = 'Current cover';
          item.innerHTML = `<img src="${esc(currentUrl)}" alt="" loading="lazy">`;
          item.addEventListener('click', () => overlay.remove());
          grid.appendChild(item);
        }

        // Upload custom cover
        const uploadInput = document.createElement('input');
        uploadInput.type = 'file';
        uploadInput.accept = 'image/*';
        uploadInput.style.display = 'none';
        modal.appendChild(uploadInput);

        const uploadItem = document.createElement('div');
        uploadItem.className = 'cover-picker-item cover-picker-upload';
        uploadItem.title = 'Upload custom cover';
        uploadItem.innerHTML = `<div class="cover-picker-upload-inner">+</div>`;
        uploadItem.addEventListener('click', () => uploadInput.click());
        uploadInput.addEventListener('change', async () => {
          const file = uploadInput.files[0];
          if (!file) return;
          uploadInput.value = '';
          uploadItem.style.opacity = '0.5';
          try {
            const dataUrl = await new Promise((resolve, reject) => {
              const img = new Image();
              const objectUrl = URL.createObjectURL(file);
              img.onload = () => {
                URL.revokeObjectURL(objectUrl);
                const MAX_W = 400, MAX_H = 600;
                const scale = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
                const w = Math.round(img.width * scale);
                const h = Math.round(img.height * scale);
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
              };
              img.onerror = reject;
              img.src = objectUrl;
            });
            await pickCover(dataUrl);
          } catch (e) {
            console.error(e);
            uploadItem.style.opacity = '';
            alert('Could not load that image.');
          }
        });
        grid.appendChild(uploadItem);

        if (!filteredEditions.length) {
          const msg = document.createElement('div');
          msg.style.cssText = 'font-size:.85rem;color:var(--text-muted);width:100%;padding-top:.25rem';
          msg.textContent = currentUrl ? 'No other edition covers found.' : 'No edition covers found.';
          grid.appendChild(msg);
        }

        filteredEditions.forEach(ed => {
          const url = ed.image.url;
          const item = document.createElement('div');
          item.className = 'cover-picker-item';
          if (ed.publisher?.name || ed.release_year) item.title = [ed.publisher?.name, ed.release_year].filter(Boolean).join(' · ');
          item.innerHTML = `<img src="${esc(url)}" alt="" loading="lazy">`;
          item.addEventListener('click', () => { item.style.opacity = '0.5'; pickCover(url); });
          grid.appendChild(item);
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<span style="font-size:.85rem;color:var(--text-muted)">Failed to load covers.</span>';
      }
    }

    function tsOf(book, field) {
      const ts = book[field];
      if (!ts) return 0;
      if (ts.seconds != null) return ts.seconds;
      if (ts.toDate) return ts.toDate().getTime() / 1000;
      return 0;
    }

    function formatDateTs(ts, precision) {
      if (!ts?.toDate || !precision) return 'Unknown';
      const d = ts.toDate();
      if (precision === 'year') return String(d.getFullYear());
      if (precision === 'day')  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    }

    function createPartialDatePicker(ts, precision) {
      const d = ts?.toDate?.() ?? null;
      const initYear  = d ? d.getFullYear() : '';
      const initMonth = (d && precision !== 'year') ? d.getMonth() + 1 : '';
      const initDay   = (d && precision !== 'year' && precision !== 'month') ? d.getDate() : '';

      const wrap = document.createElement('div');
      wrap.className = 'date-picker-partial';

      function makeSpinner(input, defaultVal, min, max) {
        const up = document.createElement('button');
        up.type = 'button'; up.className = 'date-num-btn'; up.textContent = '▲';
        up.addEventListener('click', () => {
          const v = parseInt(input.value);
          input.value = v ? Math.min(v + 1, max) : defaultVal;
        });
        const down = document.createElement('button');
        down.type = 'button'; down.className = 'date-num-btn'; down.textContent = '▼';
        down.addEventListener('click', () => {
          const v = parseInt(input.value);
          input.value = v ? Math.max(v - 1, min) : defaultVal;
        });
        const btns = document.createElement('div');
        btns.className = 'date-num-btns';
        btns.append(up, down);
        const spinWrap = document.createElement('div');
        spinWrap.className = 'date-num-wrap';
        spinWrap.append(input, btns);
        return spinWrap;
      }

      const dayInput = document.createElement('input');
      dayInput.type = 'text'; dayInput.inputMode = 'numeric'; dayInput.maxLength = 2;
      dayInput.className = 'date-day-input'; dayInput.placeholder = 'Day';
      dayInput.value = initDay;

      const monthSel = document.createElement('select');
      monthSel.className = 'date-month-select';
      monthSel.innerHTML = '<option value="">Month</option>' +
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
          .map((m, i) => `<option value="${i+1}"${initMonth === i+1 ? ' selected' : ''}>${m}</option>`)
          .join('');

      const yearInput = document.createElement('input');
      yearInput.type = 'text'; yearInput.inputMode = 'numeric'; yearInput.maxLength = 4;
      yearInput.className = 'date-year-input'; yearInput.placeholder = 'Year';
      yearInput.value = initYear;

      wrap.append(makeSpinner(dayInput, 1, 1, 31), monthSel, makeSpinner(yearInput, new Date().getFullYear(), 1000, 2200));

      wrap.getDate = () => {
        const year = parseInt(yearInput.value);
        if (!year || year < 1000 || year > 2200) return { date: null, precision: null };
        const month = parseInt(monthSel.value) || 0;
        const day   = parseInt(dayInput.value)  || 0;
        if (!month) return { date: new Date(year, 0, 1, 12, 0, 0), precision: 'year' };
        if (!day)   return { date: new Date(year, month - 1, 1, 12, 0, 0), precision: 'month' };
        return { date: new Date(year, month - 1, Math.min(day, 31), 12, 0, 0), precision: 'day' };
      };

      return wrap;
    }

    function makeDateEl(label, ts, field, book, withActivity = true) {
      const precision = book[field + 'Precision'] ?? null;
      const el = document.createElement('div');
      el.className = 'book-finished-meta book-date-editable';
      el.textContent = label
        ? `${label} ${formatDateTs(ts, precision)}`
        : formatDateTs(ts, precision);

      el.addEventListener('click', () => {
        const picker = createPartialDatePicker(ts, precision);

        const saveBtn = document.createElement('button');
        saveBtn.type = 'button'; saveBtn.className = 'join-club-btn date-action-btn';
        saveBtn.textContent = 'Save';

        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button'; cancelBtn.className = 'btn-update date-action-btn';
        cancelBtn.textContent = 'Cancel';

        const editorWrap = document.createElement('div');
        editorWrap.className = 'date-editor-wrap';
        editorWrap.append(picker, saveBtn, cancelBtn);
        el.replaceWith(editorWrap);

        saveBtn.addEventListener('click', async () => {
          const { date, precision: newPrec } = picker.getDate();
          if (!date) {
            editorWrap.replaceWith(makeDateEl(label, ts, field, book, withActivity));
            return;
          }
          const updates = {
            [field]: date,
            [field + 'Precision']: newPrec
          };
          const bookInfo = withActivity ? {
            title: book.title, author: book.author, gbid: book.gbid,
            rating: book.rating, review: book.review, username: profile.username
          } : null;
          await updateBookDates(user.uid, book.id, updates, bookInfo);
          book[field] = { toDate: () => date };
          book[field + 'Precision'] = newPrec;
          editorWrap.replaceWith(makeDateEl(label, book[field], field, book, withActivity));
        });

        cancelBtn.addEventListener('click', () => {
          editorWrap.replaceWith(makeDateEl(label, ts, field, book, withActivity));
        });
      });

      return el;
    }

    function renderReading(book, coverCell, closeModal) {
      const pct  = book.totalPages ? Math.round((book.currentPage / book.totalPages) * 100) : 0;
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `<div class="book-entry">
        ${bookCoverHtml(book)}
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          <div class="book-started-date"></div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-label">${book.totalPages ? `Page ${book.currentPage} of ${book.totalPages}` : `Page ${book.currentPage}`}</div>
          <div class="progress-controls">
            <input class="page-input" type="number" value="${book.currentPage}" min="0" max="9999" aria-label="Current page">
            <span class="page-sep">/</span>
            <input class="page-input page-total" type="number" value="${book.totalPages || ''}" min="1" max="9999" aria-label="Total pages" placeholder="?">
            <button class="btn-update btn-pg-update" style="display:none">Update</button>

          </div>
        </div>
        <button class="btn-remove-x" aria-label="Remove" title="Remove">${TRASH_ICON}</button>
      </div>`;
      card.querySelector('.book-cover-wrap').addEventListener('click', () => openCoverPicker(book, card.querySelector('.book-cover-wrap'), coverCell));
      card.querySelector('.book-started-date').replaceWith(makeDateEl('Started', book.addedAt, 'addedAt', book));

      const inputs    = card.querySelectorAll('.page-input');
      const fillEl    = card.querySelector('.progress-bar-fill');
      const labelEl   = card.querySelector('.progress-label');
      const updateBtn = card.querySelector('.btn-pg-update');

      inputs.forEach(inp => inp.addEventListener('input', () => { updateBtn.style.display = ''; }));

      updateBtn.addEventListener('click', async () => {
        const cur     = Math.max(0, parseInt(inputs[0].value) || 0);
        const total   = Math.max(1, parseInt(inputs[1].value) || 1);
        const clamped = Math.min(cur, total);
        inputs[0].value = clamped;
        fillEl.style.width  = Math.round((clamped / total) * 100) + '%';
        labelEl.textContent = `Page ${clamped} of ${total}`;
        await updateBookProgress(user.uid, book.id, clamped);
        book.currentPage = clamped;
        book.totalPages  = total;
        updateBtn.style.display = 'none';
        // Update progress strip on cover cell
        if (coverCell && total) {
          let strip = coverCell.querySelector('.library-progress-strip');
          if (!strip) {
            strip = document.createElement('div');
            strip.className = 'library-progress-strip';
            const fill = document.createElement('div');
            fill.className = 'library-progress-fill';
            strip.appendChild(fill);
            const titleEl = coverCell.querySelector('.library-cover-title');
            coverCell.insertBefore(strip, titleEl);
          }
          coverCell.querySelector('.library-progress-fill').style.width = Math.round((clamped / total) * 100) + '%';
        }
      });

      card.querySelector('.btn-finished').addEventListener('click', () => {
        const controls = card.querySelector('.progress-controls');
        controls.innerHTML = '<div class="rating-prompt" style="margin-top:.25rem"></div>';
        const prompt = controls.querySelector('.rating-prompt');

        const label = document.createElement('div');
        label.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
        label.textContent = 'Rate this book (optional)';
        prompt.appendChild(label);

        const picker = createStarPicker(0);
        prompt.appendChild(picker);

        const ta = document.createElement('textarea');
        ta.className = 'review-input';
        ta.placeholder = 'Write a review… (optional)';
        ta.rows = 3;
        prompt.appendChild(ta);

        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:.5rem;margin-top:.5rem';
        actions.innerHTML = `<button class="join-club-btn btn-do-finish" type="button">Mark as finished</button><button class="btn-update btn-cancel-finish" type="button">Cancel</button>`;
        prompt.appendChild(actions);

        actions.querySelector('.btn-cancel-finish').addEventListener('click', () => {
          card.replaceWith(renderReading(book, coverCell, closeModal));
        });

        actions.querySelector('.btn-do-finish').addEventListener('click', async () => {
          const rating = picker.getValue();
          const review = ta.value.trim() || null;
          await finishBook(user.uid, book.id, { title: book.title, author: book.author, gbid: book.gbid, rating, review, coverUrl: book.coverUrl }, profile.username);
          book.status     = 'finished';
          book.finishedAt = { toDate: () => new Date() };
          book.rating     = rating;
          book.review     = review;
          if (coverCell) coverCell.remove();
          closeModal();
          if (!readingList.querySelector('[data-title]')) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
          document.getElementById('finished-empty')?.remove();
          if (viewMode === 'list') {
            const newRow = makeBookListRow(book);
            newRow.addEventListener('click', () => { let ov; const c = renderFinished(book, newRow, () => ov?.remove()); ov = createBookModal(c); });
            finishedList.prepend(newRow);
          } else {
            const newCell = makeBookCoverCell(book);
            attachFinishedCell(newCell, book);
            finishedList.prepend(newCell);
          }
        });
      });

      card.querySelector('.btn-remove-x').addEventListener('click', async () => {
        if (!confirm(`Remove "${book.title}" from your library?`)) return;
        await deleteBook(user.uid, book.id, { title: book.title });
        if (coverCell) coverCell.remove();
        closeModal();
        if (!readingList.querySelector('[data-title]')) {
          showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
        }
      });

      return card;
    }

    function renderFinished(book, coverCell, closeModal) {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `<div class="book-entry">
        ${bookCoverHtml(book)}
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          <div class="book-date-range"></div>

        </div>
        <button class="btn-remove-x" aria-label="Remove" title="Remove">${TRASH_ICON}</button>

      const sepSpan = document.createElement('span');

        makeDateEl(null, book.addedAt,    'addedAt',    book),
        sepSpan,
        makeDateEl(null, book.finishedAt, 'finishedAt', book)
      );

      const ratingEditor = card.querySelector('.book-rating-editor');
      const starPicker = createStarPicker(book.rating || 0);
      ratingEditor.appendChild(starPicker);

      const reviewTa = document.createElement('textarea');
      reviewTa.className   = 'review-input';
      reviewTa.placeholder = 'Write a review…';
      reviewTa.rows = 3;
      reviewTa.value = book.review || '';
      ratingEditor.appendChild(reviewTa);

      const saveRatingBtn = document.createElement('button');
      saveRatingBtn.type = 'button'; saveRatingBtn.className = 'join-club-btn';
      saveRatingBtn.style.cssText = 'margin-top:.5rem;width:100%';
      saveRatingBtn.textContent = 'Save';
      ratingEditor.appendChild(saveRatingBtn);

      saveRatingBtn.addEventListener('click', async () => {
        saveRatingBtn.disabled = true;
        const rating = starPicker.getValue();
        const review = reviewTa.value.trim() || null;

        book.rating = rating;
        book.review = review;
        // Sync rating badge on the grid cell
        if (coverCell) {
          let badge = coverCell.querySelector('.library-cover-rating');
          if (rating) {
            const html = cellRatingHtml(rating);

            else {
              badge = document.createElement('div');
              badge.className = 'library-cover-rating';
              badge.innerHTML = html;
              const info = coverCell.querySelector('.library-cover-info');
              info.insertBefore(badge, info.firstChild);
            }
          } else if (badge) {
            badge.remove();
          }

      });

      card.querySelector('.btn-remove-x').addEventListener('click', async () => {
        if (!confirm(`Remove "${book.title}" from your library?`)) return;
        await deleteBook(user.uid, book.id, { title: book.title });
        if (coverCell) coverCell.remove();

    function renderReadingView(book) {
      const pct  = book.totalPages ? Math.round((book.currentPage / book.totalPages) * 100) : 0;
      const card = document.createElement('div');
      card.className = 'card';
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `<div class="book-entry">
        ${bookCoverHtml(book)}
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          ${book.totalPages ? `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-label">Page ${book.currentPage} of ${book.totalPages}</div>` : ''}
        </div>
      </div>`;
      return card;
    }

    function renderFinishedView(book) {
      const fmt = (ts, prec) => {
        if (!ts?.toDate || !prec) return null;
        const d = ts.toDate();
        if (prec === 'year') return String(d.getFullYear());
        if (prec === 'day')  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
      };
      const whenStarted  = fmt(book.addedAt, book.addedAtPrecision);
      const whenFinished = fmt(book.finishedAt, book.finishedAtPrecision);
      const card = document.createElement('div');
      card.className = 'card';
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      const starsHtml  = renderStars(book.rating);
      const reviewHtml = book.review
        ? `<div class="review-preview">${esc(book.review.slice(0, 100))}${book.review.length > 100 ? '…' : ''}</div>`
        : '';
      card.innerHTML = `<div class="book-entry">
        ${bookCoverHtml(book)}
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          ${(whenStarted || whenFinished) ? `<div class="book-finished-meta">${whenStarted || 'Unknown'} – ${whenFinished || 'Unknown'}</div>` : ''}
          ${starsHtml}
          ${reviewHtml}
        </div>
      </div>`;
      return card;
    }

    try {
      function sortBooks(books) {
        const reading  = books
          .filter(b => b.status === 'reading')
          .sort((a, b) => tsOf(b, 'addedAt') - tsOf(a, 'addedAt'));
        const finished = books
          .filter(b => b.status === 'finished')
          .sort((a, b) => {
            const bTs = tsOf(b, 'finishedAt') || tsOf(b, 'addedAt');
            const aTs = tsOf(a, 'finishedAt') || tsOf(a, 'addedAt');
            return bTs - aTs;
          });
        return { reading, finished };
      }

      function setTitles(reading, finished) {
        document.getElementById('reading-title').textContent = `Currently Reading · ${reading.length}`;
        document.getElementById('finished-title').textContent = `Finished · ${finished.length}`;
      }

      function setupFinishedSort(finished, attachCell, listAttachFn) {
        const finishedSortEl = document.getElementById('finished-sort');
        finishedSortEl.style.display = '';
        const sortBtns = finishedSortEl.querySelectorAll('.sort-btn');

        let sortState = (() => { try { return JSON.parse(localStorage.getItem('library-finished-sort')) || {}; } catch { return {}; } })();
        if (!sortState.key) sortState = { key: 'date', dir: 'desc' };

        const updateSortUI = () => {
          sortBtns.forEach(btn => {
            const active = btn.dataset.key === sortState.key;
            btn.classList.toggle('sort-btn-active', active);
            if (active) {
              btn.textContent = btn.dataset.key === 'alpha'
                ? (sortState.dir === 'asc' ? 'A–Z' : 'Z–A')
                : btn.dataset.label + (sortState.dir === 'asc' ? ' ↑' : ' ↓');
            } else {
              btn.textContent = btn.dataset.label;
            }
          });
        };

        const alphaKey = t => (t || '').replace(/^the\s+/i, '');

        const renderFinishedSorted = () => {
          finishedList.innerHTML = '';
          finishedList.style.display = viewMode === 'list' ? 'block' : '';
          const { key, dir } = sortState;
          const asc = dir === 'asc';
          const sorted = [...finished];
          switch (key) {
            case 'alpha': {
              sorted.sort((a, b) => { const ak = alphaKey(a.title), bk = alphaKey(b.title); return asc ? ak.localeCompare(bk) : bk.localeCompare(ak); });
              break;
            }
            case 'release': sorted.sort((a, b) => asc ? (a.releaseYear||9999) - (b.releaseYear||9999) : (b.releaseYear||0) - (a.releaseYear||0)); break;
            case 'rating':  sorted.sort((a, b) => asc ? (a.rating||0) - (b.rating||0) : (b.rating||0) - (a.rating||0)); break;
            default:        sorted.sort((a, b) => { const at = tsOf(a,'finishedAt')||tsOf(a,'addedAt'), bt = tsOf(b,'finishedAt')||tsOf(b,'addedAt'); return asc ? at - bt : bt - at; });
          }
          if (!sorted.length) { showEmpty(finishedList, 'finished-empty', 'No finished books yet.'); return; }
          sorted.forEach(b => {
            if (viewMode === 'list' && listAttachFn) {
              const row = makeBookListRow(b); listAttachFn(row, b); finishedList.appendChild(row);
            } else {
              const cell = makeBookCoverCell(b); attachCell(cell, b); finishedList.appendChild(cell);
            }
          });
          const q = (document.getElementById('library-filter')?.value || '').trim().toLowerCase();
          if (q) finishedList.querySelectorAll('[data-title]').forEach(el => {
            el.style.display = (el.dataset.title.includes(q) || el.dataset.author.includes(q)) ? '' : 'none';
          });
        };

        sortBtns.forEach(btn => btn.addEventListener('click', () => {
          if (btn.dataset.key === sortState.key) {
            sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
          } else {
            sortState = { key: btn.dataset.key, dir: btn.dataset.default };
          }
          localStorage.setItem('library-finished-sort', JSON.stringify(sortState));
          updateSortUI();
          renderFinishedSorted();
        }));

        updateSortUI();
        renderFinishedSorted();

        // Background-fetch release years

        const missing = finished.filter(b => b.gbid && b.releaseYear == null);
        if (missing.length) {
          (async () => {
            try {
              const slugs = missing.filter(b => !/^\d+$/.test(b.gbid)).map(b => b.gbid);
              const ids   = missing.filter(b => /^\d+$/.test(b.gbid)).map(b => parseInt(b.gbid, 10));
              const parts = [], vars = {};
              if (slugs.length) { parts.push('bySlug:books(where:{slug:{_in:$slugs}}){slug release_year}'); vars.slugs = slugs; }
              if (ids.length)   { parts.push('byId:books(where:{id:{_in:$ids}}){id release_year}');         vars.ids   = ids; }
              if (!parts.length) return;
              const paramStr = [slugs.length && '$slugs:[String!]!', ids.length && '$ids:[Int!]!'].filter(Boolean).join(',');
              const d = await hcPost(`query(${paramStr}){${parts.join(' ')}}`, vars);
              const yearMap = new Map();
              (d?.data?.bySlug || []).forEach(b => { if (b.release_year) yearMap.set(b.slug, b.release_year); });
              (d?.data?.byId   || []).forEach(b => { if (b.release_year) yearMap.set(String(b.id), b.release_year); });
              let updated = false;
              missing.forEach(b => { const y = yearMap.get(b.gbid); if (y) { b.releaseYear = y; updated = true; } });
              if (updated && sortState.key === 'release') renderFinishedSorted();
            } catch (e) { console.error('release year fetch:', e); }
          })();
        }
        return renderFinishedSorted;
      }

      let renderReadingFn    = () => {};
      let reRenderFinishedFn = () => {};

      if (isOwn) {
        const { reading, finished } = sortBooks(await getBooks(user.uid));
        setTitles(reading, finished);

        renderReadingFn = () => {
          readingList.innerHTML = '';
          readingList.style.display = viewMode === 'list' ? 'block' : '';
          if (!reading.length) { showEmpty(readingList, 'reading-empty', 'Nothing in progress.'); return; }
          reading.forEach(b => {
            if (viewMode === 'list') {
              const row = makeBookListRow(b);
              row.addEventListener('click', () => { let ov; const c = renderReading(b, row, () => ov?.remove()); ov = createBookModal(c); });
              readingList.appendChild(row);
            } else {
              const cell = makeBookCoverCell(b);
              attachReadingCell(cell, b);
              readingList.appendChild(cell);
            }
          });
        };
        renderReadingFn();

        reRenderFinishedFn = setupFinishedSort(
          finished,
          (cell, b) => attachFinishedCell(cell, b),
          (row,  b) => { row.addEventListener('click', () => { let ov; const c = renderFinished(b, row, () => ov?.remove()); ov = createBookModal(c); }); }
        );
      } else {
        document.getElementById('add-book-card').style.display = 'none';
        const backLink = document.getElementById('back-link');
        backLink.style.display = '';
        backLink.addEventListener('click', e => { if (history.length > 1) { e.preventDefault(); history.back(); } });

        const target = await getProfileByUsername(viewUser);
        if (target) {
          const { reading, finished } = sortBooks(await getBooks(target.uid));
          setTitles(reading, finished);

          renderReadingFn = () => {
            readingList.innerHTML = '';
            readingList.style.display = viewMode === 'list' ? 'block' : '';
            if (!reading.length) { showEmpty(readingList, 'reading-empty', 'Nothing in progress.'); return; }
            reading.forEach(b => {
              if (viewMode === 'list') {
                const row = makeBookListRow(b);
                row.addEventListener('click', () => createBookModal(renderReadingView(b)));
                readingList.appendChild(row);
              } else {
                const cell = makeBookCoverCell(b);
                cell.addEventListener('click', () => createBookModal(renderReadingView(b)));
                readingList.appendChild(cell);
              }
            });
          };
          renderReadingFn();

          reRenderFinishedFn = setupFinishedSort(
            finished,
            (cell, b) => cell.addEventListener('click', () => createBookModal(renderFinishedView(b))),
            (row,  b) => { row.addEventListener('click', () => createBookModal(renderFinishedView(b))); }
          );
        }
      }
      if (readingList.querySelector('[data-title]') || finishedList.querySelector('[data-title]')) {
        const filterWrap  = document.getElementById('library-filter-wrap');
        const filterInput = document.getElementById('library-filter');
        const gridBtn     = document.getElementById('view-grid-btn');
        const listBtn     = document.getElementById('view-list-btn');
        filterWrap.style.display = '';

        function applyFilter() {
          const q = filterInput.value.trim().toLowerCase();
          [readingList, finishedList].forEach(container => {
            container.querySelectorAll('[data-title]').forEach(el => {
              el.style.display = (!q || el.dataset.title.includes(q) || el.dataset.author.includes(q)) ? '' : 'none';
            });
          });
        }
        filterInput.addEventListener('input', applyFilter);

        function updateToggleUI() {
          gridBtn.style.opacity = viewMode === 'grid' ? '1' : '0.45';
          listBtn.style.opacity = viewMode === 'list' ? '1' : '0.45';
        }
        updateToggleUI();

        gridBtn.addEventListener('click', () => {
          if (viewMode === 'grid') return;
          viewMode = 'grid';
          localStorage.setItem('library-view', 'grid');
          updateToggleUI();
          readingList.innerHTML = '';
          finishedList.innerHTML = '';
          renderReadingFn();
          reRenderFinishedFn?.();
          applyFilter();
        });
        listBtn.addEventListener('click', () => {
          if (viewMode === 'list') return;
          viewMode = 'list';
          localStorage.setItem('library-view', 'list');
          updateToggleUI();
          readingList.innerHTML = '';
          finishedList.innerHTML = '';
          renderReadingFn();
          reRenderFinishedFn?.();
          applyFilter();
        });
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }

    if (isOwn) {
    // ── Add book form ──────────────────────────────────────────────────────────
    const toggle      = document.getElementById('add-book-toggle');
    const form        = document.getElementById('add-book-form');
    const cancelBtn   = document.getElementById('cancel-btn');
    const saveBtn     = document.getElementById('save-btn');
    const searchInput = document.getElementById('book-search');
    const suggestBox  = document.getElementById('book-suggestions');

    let selectedBook = null;
    let searchTimer;
    function setAddEnabled(on) {
      saveBtn.disabled     = !on;
      finishedBtn.disabled = !on;
    }

    function resetForm() {
      searchInput.value        = '';
      suggestBox.innerHTML     = '';
      suggestBox.style.display = 'none';
      selectedBook = null;
      setAddEnabled(false);
      // Restore form to initial state in case we were in the "Already read" rating step
      const searchWrap = document.getElementById('book-search-wrap');
      const fields     = form.querySelector('.add-book-fields');
      const actions    = form.querySelector('.add-book-actions');
      searchWrap.style.display = '';
      [...fields.children].forEach(el => { if (el !== searchWrap) el.remove(); });
      actions.innerHTML = '';
      actions.append(cancelBtn, finishedBtn, saveBtn);
    }

    function closeForm() { form.hidden = true; toggle.hidden = false; resetForm(); }

    toggle.addEventListener('click', () => { form.hidden = false; toggle.hidden = true; searchInput.focus(); });
    cancelBtn.addEventListener('click', closeForm);

    document.addEventListener('click', e => {
      if (!document.getElementById('book-search-wrap').contains(e.target)) {
        suggestBox.style.display = 'none';
      }
    });

    searchInput.addEventListener('input', () => {
      selectedBook = null;
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 3) { suggestBox.innerHTML = ''; suggestBox.style.display = 'none'; return; }
      searchTimer = setTimeout(() => fetchSuggestions(q), 250);
    });

    async function fetchSuggestions(q) {
      try {
        const res = await fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query Search($q: String!) {
              search(query: $q, query_type: "Book", per_page: 10) { results }
            }`,
            variables: { q }
          })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const hits = data.data?.search?.results?.hits || [];
        const seen = new Set();
        const items = hits.map(h => h.document).filter(doc => {
          const author = Array.isArray(doc.author_names) ? (doc.author_names[0] || '') : (doc.author_names || '');
          const key = `${(doc.title || '').toLowerCase()}||${author.toLowerCase()}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        }).slice(0, 8);
        renderSuggestions(items);
      } catch (err) {
        console.error('Book search failed:', err);
      }
    }

    function renderSuggestions(items) {
      suggestBox.innerHTML = '';
      if (!items.length) { suggestBox.style.display = 'none'; return; }

      items.forEach(doc => {
        const title       = doc.title || '';
        const author      = Array.isArray(doc.author_names) ? doc.author_names[0] : doc.author_names || '';
        const pages       = doc.pages || 0;
        const cover       = doc.image?.url || '';
        const slug        = doc.slug || String(doc.id);
        const releaseYear = doc.release_year ? parseInt(doc.release_year, 10) : null;

        const el = document.createElement('div');
        el.className = 'book-suggestion-item';

        const img  = cover
          ? `<img class="suggestion-cover" src="${cover}" alt="">`
          : `<div class="suggestion-cover-placeholder"></div>`;
        const meta = author ? `by ${esc(author)}` : '';

        el.innerHTML = `<div class="suggestion-inner">${img}<div><div class="suggestion-title">${esc(title)}</div><div class="suggestion-meta">${meta}</div></div></div>`;

        el.addEventListener('mousedown', e => {
          e.preventDefault();
          el.style.background = 'var(--accent)';
          el.style.color      = '#fff';
          setTimeout(() => {
            selectedBook             = { title, author, pages, gbid: slug, cover, releaseYear };
            searchInput.value        = title;
            suggestBox.innerHTML     = '';
            suggestBox.style.display = 'none';
            setAddEnabled(true);
          }, 150);
        });

        suggestBox.appendChild(el);
      });

      suggestBox.style.display = 'block';
    }

    const finishedBtn = document.getElementById('finished-btn');

    saveBtn.addEventListener('click', async () => {
      if (!selectedBook) return;
      const { title, author, pages, gbid, cover, releaseYear } = selectedBook;

      saveBtn.disabled    = true;
      saveBtn.textContent = 'Adding…';

      const id   = await addBook(user.uid, { title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear }, profile.username);
      const book = { id, title, author, totalPages: pages, currentPage: 0, status: 'reading', gbid, coverUrl: cover, releaseYear, addedAt: { toDate: () => new Date() } };

      document.getElementById('reading-empty')?.remove();
      const newCell = makeBookCoverCell(book);
      attachReadingCell(newCell, book);
      readingList.prepend(newCell);

      saveBtn.disabled    = false;
      saveBtn.textContent = 'Start reading';
      cancelBtn.click();
    });

    finishedBtn.addEventListener('click', () => {
      if (!selectedBook) return;
      const { title, author, pages, gbid, cover, releaseYear } = selectedBook;

      const fields     = form.querySelector('.add-book-fields');
      const actions    = form.querySelector('.add-book-actions');
      const searchWrap = document.getElementById('book-search-wrap');
      const origBtns   = [...actions.children];

      searchWrap.style.display = 'none';

      const ratingDiv = document.createElement('div');
      const titleLabel = document.createElement('div');
      titleLabel.style.cssText = 'font-size:.85rem;font-weight:600;margin-bottom:.5rem';
      titleLabel.textContent = title;
      const rateLabel = document.createElement('div');
      rateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
      rateLabel.textContent = 'Rate this book (optional)';
      const picker = createStarPicker(0);
      const ta = document.createElement('textarea');
      ta.className = 'review-input'; ta.placeholder = 'Write a review… (optional)'; ta.rows = 3;
      const startedLabel = document.createElement('div');
      startedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.5rem 0 .25rem';
      startedLabel.textContent = 'Date started (optional)';
      const startedPicker = createPartialDatePicker(null, null);
      const dateLabel = document.createElement('div');
      dateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.5rem 0 .25rem';
      dateLabel.textContent = 'Date finished (optional)';
      const datePicker = createPartialDatePicker(null, null);
      ratingDiv.append(titleLabel, rateLabel, picker, ta, startedLabel, startedPicker, dateLabel, datePicker);
      fields.appendChild(ratingDiv);

      actions.innerHTML = '';
      const backBtn    = document.createElement('button');
      backBtn.type = 'button'; backBtn.className = 'btn-update'; backBtn.textContent = 'Back';
      const confirmBtn = document.createElement('button');
      confirmBtn.type = 'button'; confirmBtn.className = 'join-club-btn'; confirmBtn.textContent = 'Add to finished';
      actions.append(backBtn, confirmBtn);

      backBtn.addEventListener('click', () => {
        ratingDiv.remove();
        searchWrap.style.display = '';
        actions.innerHTML = '';
        origBtns.forEach(b => actions.appendChild(b));
      });

      confirmBtn.addEventListener('click', async () => {
        confirmBtn.disabled = true; confirmBtn.textContent = 'Adding…';
        const rating = picker.getValue();
        const review = ta.value.trim() || null;
        const { date: addedAt,    precision: startedPrec  } = startedPicker.getDate();
        const { date: finishedAt, precision: finishedPrec } = datePicker.getDate();
        const id = await addFinishedBook(user.uid, {
          title, author, totalPages: pages, gbid, coverUrl: cover, rating, review, releaseYear,
          finishedAt, finishedAtPrecision: finishedAt ? finishedPrec : undefined,
          addedAt,    addedAtPrecision:    addedAt    ? startedPrec  : undefined
        }, profile.username);
        const book = {
          id, title, author, totalPages: pages, currentPage: pages, status: 'finished',
          coverUrl:            cover,
          addedAt:             addedAt    ? { toDate: () => addedAt }    : { toDate: () => new Date() },
          addedAtPrecision:    addedAt    ? startedPrec  : null,
          finishedAt:          finishedAt ? { toDate: () => finishedAt } : null,
          finishedAtPrecision: finishedAt ? finishedPrec : null,
          gbid, rating, review, releaseYear
        };
        document.getElementById('finished-empty')?.remove();
        const newCell = makeBookCoverCell(book);
        attachFinishedCell(newCell, book);
        finishedList.prepend(newCell);
        closeForm();
      });
    });
    } // end if (isOwn)
  </script>
</body>
</html>
