<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Library — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Home</a>
        <a href="../clubs/"    data-nav="clubs">Clubs</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <a class="back-link" id="back-link" href="../" style="display:none">← Back</a>
    <h1 class="page-title" id="page-title">Library</h1>

    <div class="add-book-card card" id="add-book-card">
      <button class="add-book-toggle" id="add-book-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add book
      </button>
      <div class="add-book-form" id="add-book-form" hidden>
        <div class="add-book-fields">
          <div class="book-search-wrap" id="book-search-wrap">
            <input class="add-book-input" type="text" placeholder="Search for a book…" id="book-search" autocomplete="off" spellcheck="false">
            <div class="book-suggestions" id="book-suggestions" style="display:none"></div>
          </div>
        </div>
        <div class="add-book-actions">
          <button class="btn-update" id="cancel-btn">Cancel</button>
          <button class="btn-update" id="finished-btn" disabled>Already read</button>
          <button class="join-club-btn" id="save-btn" disabled>Start reading</button>
        </div>
      </div>
    </div>

    <p class="section-title">Currently Reading</p>
    <div id="reading-list"></div>

    <p class="section-title" style="margin-top:1.5rem">Finished</p>
    <div id="finished-list"></div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getBooks, addBook, addFinishedBook, updateBookProgress, finishBook, deleteBook, unfinishBook, updateBookRating, updateBookDates, getProfileByUsername } from '../js/firebase.js';

    const { user, profile } = await requireAuth();

    const params   = new URLSearchParams(location.search);
    const viewUser = params.get('u')?.toLowerCase();
    const isOwn    = !viewUser;

    const readingList  = document.getElementById('reading-list');
    const finishedList = document.getElementById('finished-list');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      p.textContent = msg;
      container.appendChild(p);
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function createStarPicker(initial) {
      const wrap = document.createElement('div');
      wrap.className = 'star-picker';
      let value = initial || 0;
      const btns = [];

      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-pick-btn';
        btn.textContent = '★';
        btn.dataset.i = i;
        btns.push(btn);
        wrap.appendChild(btn);
      }

      function update(v) {
        value = v;
        btns.forEach((b, idx) => {
          const n = idx + 1;
          b.classList.remove('full', 'half');
          if (value >= n)          b.classList.add('full');
          else if (value >= n-0.5) b.classList.add('half');
        });
      }

      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.star-pick-btn');
        if (!btn) return;
        const i    = parseInt(btn.dataset.i);
        const half = e.offsetX < btn.offsetWidth / 2;
        const v    = half ? i - 0.5 : i;
        update(v === value ? 0 : v);
      });

      wrap.getValue = () => value || null;
      update(value);
      return wrap;
    }

    function toDateInputVal(ts) {
      if (!ts?.toDate) return '';
      const d = ts.toDate();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function makeDateEl(label, ts, field, bookId) {
      const el = document.createElement('div');
      el.className = 'book-finished-meta book-date-editable';
      const dateStr = ts?.toDate?.()
        ? ts.toDate().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' })
        : 'Unknown';
      el.textContent = `${label} ${dateStr}`;

      el.addEventListener('click', () => {
        const initialVal = toDateInputVal(ts);
        const input = document.createElement('input');
        input.type = 'date';
        input.className = 'date-edit-input';
        input.value = initialVal;
        el.replaceWith(input);
        input.focus();

        let done = false;
        async function commit() {
          if (done) return;
          done = true;
          const val = input.value;
          let newTs = ts;
          if (val && val !== initialVal) {
            const newDate = new Date(val + 'T12:00:00');
            await updateBookDates(user.uid, bookId, { [field]: newDate });
            newTs = { toDate: () => newDate };
          }
          input.replaceWith(makeDateEl(label, newTs, field, bookId));
        }

        input.addEventListener('change', commit);
        input.addEventListener('blur', commit);
      });

      return el;
    }

    function renderReading(book) {
      const pct  = book.totalPages ? Math.round((book.currentPage / book.totalPages) * 100) : 0;
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `<div class="book-entry">
        <div class="book-cover">📖</div>
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          <div class="book-started-date"></div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-label">${book.totalPages ? `Page ${book.currentPage} of ${book.totalPages}` : `Page ${book.currentPage}`}</div>
          <div class="progress-controls">
            <input class="page-input" type="number" value="${book.currentPage}" min="0" max="9999" aria-label="Current page">
            <span class="page-sep">/</span>
            <input class="page-input page-total" type="number" value="${book.totalPages || ''}" min="1" max="9999" aria-label="Total pages" placeholder="?">
            <button class="btn-update btn-pg-update" style="display:none">Update</button>
            <button class="btn-finished">Finished</button>
          </div>
        </div>
        <button class="btn-remove-x" aria-label="Remove" title="Remove">✕</button>
      </div>`;
      card.querySelector('.book-started-date').replaceWith(makeDateEl('Started', book.addedAt, 'addedAt', book.id));

      const inputs    = card.querySelectorAll('.page-input');
      const fillEl    = card.querySelector('.progress-bar-fill');
      const labelEl   = card.querySelector('.progress-label');
      const updateBtn = card.querySelector('.btn-pg-update');

      inputs.forEach(inp => inp.addEventListener('input', () => { updateBtn.style.display = ''; }));

      updateBtn.addEventListener('click', async () => {
        const cur     = Math.max(0, parseInt(inputs[0].value) || 0);
        const total   = Math.max(1, parseInt(inputs[1].value) || 1);
        const clamped = Math.min(cur, total);
        inputs[0].value = clamped;
        fillEl.style.width  = Math.round((clamped / total) * 100) + '%';
        labelEl.textContent = `Page ${clamped} of ${total}`;
        await updateBookProgress(user.uid, book.id, clamped);
        book.currentPage    = clamped;
        book.totalPages     = total;
        updateBtn.style.display = 'none';
      });

      card.querySelector('.btn-finished').addEventListener('click', () => {
        const controls = card.querySelector('.progress-controls');
        controls.innerHTML = '<div class="rating-prompt" style="margin-top:.25rem"></div>';
        const prompt = controls.querySelector('.rating-prompt');

        const label = document.createElement('div');
        label.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
        label.textContent = 'Rate this book (optional)';
        prompt.appendChild(label);

        const picker = createStarPicker(0);
        prompt.appendChild(picker);

        const ta = document.createElement('textarea');
        ta.className = 'review-input';
        ta.placeholder = 'Write a review… (optional)';
        ta.rows = 3;
        prompt.appendChild(ta);

        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:.5rem;margin-top:.5rem';
        actions.innerHTML = `<button class="join-club-btn btn-do-finish" type="button">Mark as finished</button><button class="btn-update btn-cancel-finish" type="button">Cancel</button>`;
        prompt.appendChild(actions);

        actions.querySelector('.btn-cancel-finish').addEventListener('click', () => {
          card.replaceWith(renderReading(book));
        });

        actions.querySelector('.btn-do-finish').addEventListener('click', async () => {
          const rating = picker.getValue();
          const review = ta.value.trim() || null;
          await finishBook(user.uid, book.id, { title: book.title, author: book.author, gbid: book.gbid, rating, review }, profile.username);
          card.remove();
          if (!readingList.querySelector('.card')) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
          book.status     = 'finished';
          book.finishedAt = { toDate: () => new Date() };
          book.rating     = rating;
          book.review     = review;
          document.getElementById('finished-empty')?.remove();
          finishedList.prepend(renderFinished(book));
        });
      });

      card.querySelector('.btn-remove-x').addEventListener('click', async () => {
        await deleteBook(user.uid, book.id, { title: book.title });
        card.remove();
        if (!readingList.querySelector('.card')) {
          showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
        }
      });

      return card;
    }

    function renderFinished(book) {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      const starsHtml  = renderStars(book.rating);
      const reviewHtml = book.review
        ? `<div class="review-preview">${esc(book.review.slice(0, 100))}${book.review.length > 100 ? '…' : ''}</div>`
        : '';

      card.innerHTML = `<div class="book-entry">
        <div class="book-cover">📖</div>
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          <div class="book-finished-date"></div>
          ${starsHtml}
          ${reviewHtml}
          <div class="progress-controls" style="margin-top:.5rem">
            <button class="btn-update btn-rate">${book.rating || book.review ? 'Edit rating' : 'Rate'}</button>
          </div>
          <div class="rating-edit-form" style="display:none;margin-top:.75rem"></div>
        </div>
        <button class="btn-remove-x" aria-label="Remove" title="Remove">✕</button>
      </div>`;
      card.querySelector('.book-finished-date').replaceWith(makeDateEl('Finished', book.finishedAt, 'finishedAt', book.id));

      card.querySelector('.btn-rate').addEventListener('click', () => {
        const editForm = card.querySelector('.rating-edit-form');
        if (editForm.style.display !== 'none') { editForm.style.display = 'none'; return; }

        editForm.innerHTML = '';
        const rateLabel = document.createElement('div');
        rateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
        rateLabel.textContent = 'Your rating';
        editForm.appendChild(rateLabel);

        const picker = createStarPicker(book.rating || 0);
        editForm.appendChild(picker);

        const ta = document.createElement('textarea');
        ta.className   = 'review-input';
        ta.placeholder = 'Write a review…';
        ta.rows = 3;
        ta.value = book.review || '';
        editForm.appendChild(ta);

        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:.5rem;margin-top:.5rem';
        actions.innerHTML = `<button class="join-club-btn btn-save-rating" type="button">Save</button><button class="btn-update btn-cancel-rating" type="button">Cancel</button>`;
        editForm.appendChild(actions);
        editForm.style.display = 'block';

        actions.querySelector('.btn-save-rating').addEventListener('click', async () => {
          const rating = picker.getValue();
          const review = ta.value.trim() || null;
          await updateBookRating(user.uid, book.id, { rating, review });
          book.rating = rating;
          book.review = review;
          card.replaceWith(renderFinished(book));
        });
        actions.querySelector('.btn-cancel-rating').addEventListener('click', () => {
          editForm.style.display = 'none';
        });
      });

      card.querySelector('.btn-remove-x').addEventListener('click', async () => {
        await deleteBook(user.uid, book.id, { title: book.title });
        card.remove();
        if (!finishedList.querySelector('.card')) {
          showEmpty(finishedList, 'finished-empty', 'No finished books yet.');
        }
      });

      return card;
    }

    function renderReadingView(book) {
      const pct  = book.totalPages ? Math.round((book.currentPage / book.totalPages) * 100) : 0;
      const card = document.createElement('div');
      card.className = 'card';
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `<div class="book-entry">
        <div class="book-cover">📖</div>
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          ${book.totalPages ? `<div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-label">Page ${book.currentPage} of ${book.totalPages}</div>` : ''}
        </div>
      </div>`;
      return card;
    }

    function renderFinishedView(book) {
      const when = book.finishedAt?.toDate?.()
        ? book.finishedAt.toDate().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' })
        : 'Recently';
      const card = document.createElement('div');
      card.className = 'card';
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      const starsHtml  = renderStars(book.rating);
      const reviewHtml = book.review
        ? `<div class="review-preview">${esc(book.review.slice(0, 100))}${book.review.length > 100 ? '…' : ''}</div>`
        : '';
      card.innerHTML = `<div class="book-entry">
        <div class="book-cover">📖</div>
        <div class="book-info">
          ${titleHtml}
          ${book.author ? `<div class="book-author">${esc(book.author)}</div>` : ''}
          <div class="book-finished-meta">Finished ${when}</div>
          ${starsHtml}
          ${reviewHtml}
        </div>
      </div>`;
      return card;
    }

    try {
      if (isOwn) {
        const books    = await getBooks(user.uid);
        const reading  = books.filter(b => b.status === 'reading');
        const finished = books.filter(b => b.status === 'finished');

        if (reading.length === 0) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
        else reading.forEach(b => readingList.appendChild(renderReading(b)));

        if (finished.length === 0) showEmpty(finishedList, 'finished-empty', 'No finished books yet.');
        else finished.forEach(b => finishedList.appendChild(renderFinished(b)));
      } else {
        document.getElementById('add-book-card').style.display = 'none';
        const backLink = document.getElementById('back-link');
        backLink.style.display = '';
        backLink.addEventListener('click', e => { if (history.length > 1) { e.preventDefault(); history.back(); } });

        const target = await getProfileByUsername(viewUser);
        if (!target) {
          document.getElementById('page-title').textContent = 'User not found';
        } else {
          document.getElementById('page-title').textContent = `${target.username}'s Library`;
          const books    = await getBooks(target.uid);
          const reading  = books.filter(b => b.status === 'reading');
          const finished = books.filter(b => b.status === 'finished');

          if (reading.length === 0) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
          else reading.forEach(b => readingList.appendChild(renderReadingView(b)));

          if (finished.length === 0) showEmpty(finishedList, 'finished-empty', 'No finished books yet.');
          else finished.forEach(b => finishedList.appendChild(renderFinishedView(b)));
        }
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }

    if (isOwn) {
    // ── Add book form ──────────────────────────────────────────────────────────
    const toggle      = document.getElementById('add-book-toggle');
    const form        = document.getElementById('add-book-form');
    const cancelBtn   = document.getElementById('cancel-btn');
    const saveBtn     = document.getElementById('save-btn');
    const searchInput = document.getElementById('book-search');
    const suggestBox  = document.getElementById('book-suggestions');

    let selectedBook = null;
    let searchTimer;
    let retryTimer;

    function setAddEnabled(on) {
      saveBtn.disabled     = !on;
      finishedBtn.disabled = !on;
    }

    function resetForm() {
      searchInput.value        = '';
      suggestBox.innerHTML     = '';
      suggestBox.style.display = 'none';
      selectedBook = null;
      setAddEnabled(false);
    }

    function closeForm() { form.hidden = true; toggle.hidden = false; resetForm(); }

    toggle.addEventListener('click', () => { form.hidden = false; toggle.hidden = true; searchInput.focus(); });
    cancelBtn.addEventListener('click', closeForm);

    document.addEventListener('click', e => {
      if (!document.getElementById('book-search-wrap').contains(e.target)) {
        suggestBox.style.display = 'none';
      }
    });

    searchInput.addEventListener('input', () => {
      selectedBook = null;
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 3) { suggestBox.innerHTML = ''; suggestBox.style.display = 'none'; return; }
      searchTimer = setTimeout(() => fetchSuggestions(q), 350);
    });

    async function fetchSuggestions(q) {
      try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(q)}&maxResults=20&printType=books&key=AIzaSyBj-U331sEcIO__4d0NWEdXx74QjOXae9E`);
        if (res.status === 429) { retryTimer = setTimeout(() => fetchSuggestions(q), 2500); return; }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data  = await res.json();
        const seen  = new Set();
        const items = (data.items || [])
          .filter(item => item.volumeInfo?.imageLinks)
          .sort((a, b) => (b.volumeInfo?.ratingsCount || 0) - (a.volumeInfo?.ratingsCount || 0))
          .filter(item => {
            const v      = item.volumeInfo;
            const title  = (v.title  || '').toLowerCase().replace(/\s+/g, ' ').trim();
            const author = ((v.authors || [])[0] || '').toLowerCase().trim();
            const key    = `${title}||${author}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .slice(0, 8);
        renderSuggestions(items);
      } catch (err) {
        console.error('Book search failed:', err);
      }
    }

    function renderSuggestions(items) {
      suggestBox.innerHTML = '';
      if (!items.length) { suggestBox.style.display = 'none'; return; }

      items.forEach(item => {
        const info   = item.volumeInfo || {};
        const title  = info.title || '';
        const author = (info.authors || [])[0] || '';
        const pages  = info.pageCount || 0;
        const cover  = (info.imageLinks?.smallThumbnail || info.imageLinks?.thumbnail || '').replace('http:', 'https:');
        const gbid   = item.id || '';

        const el = document.createElement('div');
        el.className = 'book-suggestion-item';

        const img  = cover
          ? `<img class="suggestion-cover" src="${cover}" alt="">`
          : `<div class="suggestion-cover-placeholder"></div>`;
        const meta = author ? `by ${esc(author)}` : '';

        el.innerHTML = `<div class="suggestion-inner">${img}<div><div class="suggestion-title">${esc(title)}</div><div class="suggestion-meta">${meta}</div></div></div>`;

        el.addEventListener('mousedown', e => {
          e.preventDefault();
          selectedBook             = { title, author, pages, gbid };
          searchInput.value        = title;
          suggestBox.innerHTML     = '';
          suggestBox.style.display = 'none';
          setAddEnabled(true);
        });

        suggestBox.appendChild(el);
      });

      suggestBox.style.display = 'block';
    }

    const finishedBtn = document.getElementById('finished-btn');

    saveBtn.addEventListener('click', async () => {
      if (!selectedBook) return;
      const { title, author, pages, gbid } = selectedBook;

      saveBtn.disabled    = true;
      saveBtn.textContent = 'Adding…';

      const id   = await addBook(user.uid, { title, author, totalPages: pages, gbid }, profile.username);
      const book = { id, title, author, totalPages: pages, currentPage: 0, status: 'reading', gbid, addedAt: { toDate: () => new Date() } };

      document.getElementById('reading-empty')?.remove();
      readingList.prepend(renderReading(book));

      saveBtn.disabled    = false;
      saveBtn.textContent = 'Start reading';
      cancelBtn.click();
    });

    finishedBtn.addEventListener('click', () => {
      if (!selectedBook) return;
      const { title, author, pages, gbid } = selectedBook;

      const fields     = form.querySelector('.add-book-fields');
      const actions    = form.querySelector('.add-book-actions');
      const searchWrap = document.getElementById('book-search-wrap');
      const origBtns   = [...actions.children];

      searchWrap.style.display = 'none';

      const ratingDiv = document.createElement('div');
      const titleLabel = document.createElement('div');
      titleLabel.style.cssText = 'font-size:.85rem;font-weight:600;margin-bottom:.5rem';
      titleLabel.textContent = title;
      const rateLabel = document.createElement('div');
      rateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
      rateLabel.textContent = 'Rate this book (optional)';
      const picker = createStarPicker(0);
      const ta = document.createElement('textarea');
      ta.className = 'review-input'; ta.placeholder = 'Write a review… (optional)'; ta.rows = 3;
      ratingDiv.append(titleLabel, rateLabel, picker, ta);
      fields.appendChild(ratingDiv);

      actions.innerHTML = '';
      const backBtn    = document.createElement('button');
      backBtn.type = 'button'; backBtn.className = 'btn-update'; backBtn.textContent = 'Back';
      const confirmBtn = document.createElement('button');
      confirmBtn.type = 'button'; confirmBtn.className = 'join-club-btn'; confirmBtn.textContent = 'Add to finished';
      actions.append(backBtn, confirmBtn);

      backBtn.addEventListener('click', () => {
        ratingDiv.remove();
        searchWrap.style.display = '';
        actions.innerHTML = '';
        origBtns.forEach(b => actions.appendChild(b));
      });

      confirmBtn.addEventListener('click', async () => {
        confirmBtn.disabled = true; confirmBtn.textContent = 'Adding…';
        const rating = picker.getValue();
        const review = ta.value.trim() || null;
        const id   = await addFinishedBook(user.uid, { title, author, totalPages: pages, gbid, rating, review });
        const book = { id, title, author, totalPages: pages, currentPage: pages, status: 'finished', finishedAt: { toDate: () => new Date() }, gbid, rating, review };
        document.getElementById('finished-empty')?.remove();
        finishedList.prepend(renderFinished(book));
        closeForm();
      });
    });
    } // end if (isOwn)
  </script>
</body>
</html>
