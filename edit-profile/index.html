<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Profile — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../search/"   data-nav="search">Search</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">


    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Profile picture</div>
      <div class="edit-photo-row">
        <div class="avatar-upload-wrap" id="avatar-wrap">
          <div class="profile-avatar-lg" id="avatar-preview"></div>
        </div>
        <div>
          <button class="profile-avatar-change" id="change-photo-btn" type="button">Change photo</button>
        </div>
      </div>
      <div class="edit-field-label" style="margin-top:.875rem;margin-bottom:.35rem">Border colour</div>
      <div class="border-color-picker" id="border-color-picker">
        <button class="border-color-swatch" data-color="" style="background:var(--border)" title="Default"></button>
        <button class="border-color-swatch" data-color="#c9a050" style="background:#c9a050" title="Gold"></button>
        <button class="border-color-swatch" data-color="#5b8fcc" style="background:#5b8fcc" title="Blue"></button>
        <button class="border-color-swatch" data-color="#d45f7a" style="background:#d45f7a" title="Rose"></button>
        <button class="border-color-swatch" data-color="#3dab8b" style="background:#3dab8b" title="Teal"></button>
        <button class="border-color-swatch" data-color="#9b6dd6" style="background:#9b6dd6" title="Purple"></button>
      </div>
      <input type="file" id="avatar-file" accept="image/*" style="display:none">
    </div>

    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Shelf <span style="font-weight:400;color:var(--text-muted);font-size:.78rem">- choose up to 4 books to display on your profile</span></div>
      <div id="shelf-edit-list" class="shelf-edit-list"></div>
      <div id="shelf-add-section">
        <div class="book-search-wrap">
          <input type="text" id="shelf-search" class="join-club-input"
            placeholder="Search for a book to add…" autocomplete="off" spellcheck="false"
            style="width:100%;box-sizing:border-box">
          <div id="shelf-suggestions" class="book-suggestions" style="display:none"></div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:.5rem">
      <button id="save-btn" class="join-club-btn" style="flex:1">Save</button>
      <button id="cancel-btn" class="btn-update" style="flex:1">Cancel</button>
    </div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getBooks, updateAvatarUrl, updateShelf, updateAvatarBorderColor } from '../js/firebase.js';

    const { user, profile } = await requireAuth();
    const libraryBooks = (await getBooks(user.uid)).filter(b => b.coverUrl);

    // ── Avatar ────────────────────────────────────────────────────────────────
    const avatarPreview  = document.getElementById('avatar-preview');
    const avatarWrap     = document.getElementById('avatar-wrap');
    const changePhotoBtn = document.getElementById('change-photo-btn');
    const fileInput      = document.getElementById('avatar-file');
    let pendingAvatarUrl = null;
    let selectedBorderColor = profile.avatarBorderColor || '';

    // ── Border colour swatches ────────────────────────────────────────────────
    const swatches = document.querySelectorAll('.border-color-swatch');
    function updateSwatchSelection() {
      swatches.forEach(s => s.classList.toggle('selected', s.dataset.color === selectedBorderColor));
    }
    swatches.forEach(s => s.addEventListener('click', () => {
      selectedBorderColor = s.dataset.color;
      updateSwatchSelection();
      document.getElementById('avatar-preview').style.borderColor = selectedBorderColor || '';
    }));
    updateSwatchSelection();

    function showAvatar(url) {
      if (url) { avatarPreview.innerHTML  = `<img src="${url}" alt="">`; }
      else     { avatarPreview.textContent = profile.username[0].toUpperCase(); }
    }
    showAvatar(profile.avatarUrl);
    if (selectedBorderColor) document.getElementById('avatar-preview').style.borderColor = selectedBorderColor;

    avatarWrap.addEventListener('click',     () => fileInput.click());
    changePhotoBtn.addEventListener('click', () => fileInput.click());

    function resizeToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          const SIZE  = 128;
          const scale = Math.min(SIZE / img.width, SIZE / img.height, 1);
          const w = Math.round(img.width  * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = reject;
        img.src = objectUrl;
      });
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      try {
        pendingAvatarUrl = await resizeToDataUrl(file);
        showAvatar(pendingAvatarUrl);
      } catch (e) {
        console.error(e);
        alert('Could not load that image.');
      } finally {
        fileInput.value = '';
      }
    });

    // ── Shelf ─────────────────────────────────────────────────────────────────
    let shelfItems = (profile.shelf || []).map(i => ({ ...i }));

    const shelfList       = document.getElementById('shelf-edit-list');
    const shelfAddSection = document.getElementById('shelf-add-section');
    const shelfSearch     = document.getElementById('shelf-search');
    const shelfSuggestions = document.getElementById('shelf-suggestions');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderShelfEdit() {
      shelfList.innerHTML = '';
      shelfItems.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'shelf-edit-item';
        const img = document.createElement('img');
        img.src = item.coverUrl || ''; img.alt = item.title || '';
        img.className = 'shelf-edit-cover';
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'shelf-edit-remove';
        btn.textContent = '×'; btn.title = 'Remove';
        btn.addEventListener('click', () => { shelfItems.splice(i, 1); renderShelfEdit(); });
        const title = document.createElement('div');
        title.className = 'shelf-edit-title'; title.textContent = item.title || '';
        div.append(img, btn, title);
        shelfList.appendChild(div);
      });
      shelfAddSection.style.display = shelfItems.length >= 4 ? 'none' : '';
      if (shelfItems.length >= 4) {
        shelfSearch.value = '';
        shelfSuggestions.style.display = 'none';
      }
    }
    renderShelfEdit();

    // Search — filter from own library (books already have covers)
    shelfSearch.addEventListener('input', () => {
      const q = shelfSearch.value.trim().toLowerCase();
      if (!q) { shelfSuggestions.style.display = 'none'; return; }
      const alreadyIn = new Set(shelfItems.map(i => i.gbid));
      const matches = libraryBooks
        .filter(b => !alreadyIn.has(b.gbid) &&
          (b.title.toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q)))
        .slice(0, 8);
      renderSuggestions(matches);
    });

    function renderSuggestions(books) {
      shelfSuggestions.innerHTML = '';
      if (!books.length) { shelfSuggestions.style.display = 'none'; return; }
      books.forEach(book => {
        const item = document.createElement('div');
        item.className = 'book-suggestion-item';
        item.innerHTML = `<div class="suggestion-inner">
          <img class="suggestion-cover" src="${esc(book.coverUrl)}" alt="">
          <div><div class="suggestion-title">${esc(book.title)}</div>
          <div class="suggestion-meta">${esc(book.author || '')}</div></div>
        </div>`;
        item.addEventListener('click', () => {
          shelfItems.push({ gbid: book.gbid, title: book.title, coverUrl: book.coverUrl });
          shelfSearch.value = '';
          shelfSuggestions.style.display = 'none';
          renderShelfEdit();
        });
        shelfSuggestions.appendChild(item);
      });
      shelfSuggestions.style.display = '';
    }

    document.addEventListener('click', e => {
      if (!shelfSuggestions.contains(e.target) && e.target !== shelfSearch) {
        shelfSuggestions.style.display = 'none';
      }
    });

    // ── Save / Cancel ─────────────────────────────────────────────────────────
    const saveBtn   = document.getElementById('save-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true;
      try {
        const saves = [];
        if (pendingAvatarUrl) saves.push(updateAvatarUrl(user.uid, pendingAvatarUrl));
        saves.push(updateShelf(user.uid, shelfItems));
        saves.push(updateAvatarBorderColor(user.uid, selectedBorderColor));
        await Promise.all(saves);

        const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
        if (pendingAvatarUrl) cached.avatarUrl = pendingAvatarUrl;
        cached.shelf = shelfItems;
        cached.avatarBorderColor = selectedBorderColor;
        localStorage.setItem('rl_profile', JSON.stringify(cached));

        location.replace('../profile/');
      } catch (e) {
        console.error(e);
        alert('Failed to save.');
        saveBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', () => { location.replace('../profile/'); });

    document.body.classList.remove('auth-loading');
  </script>
</body>
</html>
