  <script src="js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { getFollowing, getFeed } from './js/firebase.js';

    const { user } = await requireAuth();
    const main = document.querySelector('main.page-content');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function renderEvent(event) {
      const card   = document.createElement('div');
      card.className = 'card';
      const initial  = (event.username?.[0] || '?').toUpperCase();
      const bookLink = event.gbid
        ? `<a href="book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const action  = event.type === 'started'
        ? `started reading ${bookLink}`
        : `finished ${bookLink}`;
      const author  = event.bookAuthor
        ? `<span style="color:var(--text-muted)"> by ${esc(event.bookAuthor)}</span>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${event.hasReview && event.gbid ? `<a href="book/?gbid=${esc(event.gbid)}" style="font-size:.75rem;color:var(--accent);text-decoration:none">Read review</a>` : ''}</div>`
        : '';
      card.innerHTML = `<div class="friend-item">
        <a class="friend-avatar" href="profile/?u=${esc(event.username)}" style="text-decoration:none;color:inherit">${esc(initial)}</a>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4"><a href="profile/?u=${esc(event.username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(event.username)}</a> ${action}${author}</div>
          ${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;
      return card;
    }

    try {
      const following     = await getFollowing(user.uid);
      const followingUids = following.map(f => f.uid);
      const feed          = await getFeed(user.uid, followingUids);

      if (feed.length === 0) {
        const p = document.createElement('p');
        p.style.cssText = 'color:var(--text-muted);font-size:.9rem;margin-top:.25rem';
        p.textContent   = followingUids.length === 0
          ? 'Follow some readers to see their activity here.'
          : 'No activity yet.';
        main.appendChild(p);
      } else {
        feed.forEach(e => main.appendChild(renderEvent(e)));
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
</body>
</html>
