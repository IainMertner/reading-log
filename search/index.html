<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../search/"   data-nav="search">Search</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <div class="book-search-wrap" id="search-wrap" style="margin-bottom:1rem">
      <input type="search" id="search-input" class="join-club-input"
        placeholder="Search for a book…" autocomplete="off" spellcheck="false"
        style="width:100%;box-sizing:border-box;font-size:1rem;padding:.6rem .75rem">
    </div>
    <div id="search-results"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';

    await requireAuth();
    document.body.classList.remove('auth-loading');

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';
    const input   = document.getElementById('search-input');
    const results = document.getElementById('search-results');
    let timer;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (!q) { results.innerHTML = ''; return; }
      timer = setTimeout(() => fetchResults(q), 280);
    });

    async function fetchResults(q) {
      results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Searching…</p>';
      try {
        const res  = await fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query($q:String!){search(query:$q,query_type:"Book",per_page:20){results}}`,
            variables: { q }
          })
        });
        const data = await res.json();
        const hits = data?.data?.search?.results?.hits || [];
        renderResults(hits.map(h => h.document));
      } catch (e) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Search failed. Please try again.</p>';
      }
    }

    function renderResults(docs) {
      if (!docs.length) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">No results found.</p>';
        return;
      }
      results.innerHTML = '';
      docs.forEach(doc => {
        const slug   = doc.slug || String(doc.id);
        const title  = doc.title || '';
        const author = Array.isArray(doc.author_names) ? doc.author_names[0] : (doc.author_names || '');
        const cover  = doc.image?.url || '';
        const year   = doc.release_year || '';

        const a = document.createElement('a');
        a.href = `../book/?gbid=${encodeURIComponent(slug)}`;
        a.className = 'search-result-row';
        a.innerHTML = cover
          ? `<img class="search-result-cover" src="${esc(cover)}" alt="">`
          : `<div class="search-result-cover search-result-cover-placeholder"></div>`;
        a.innerHTML += `<div class="search-result-info">
          <div class="search-result-title">${esc(title)}</div>
          <div class="search-result-meta">${author ? esc(author) : ''}${author && year ? ' · ' : ''}${year ? esc(String(year)) : ''}</div>
        </div>`;
        results.appendChild(a);
      });
    }

    input.focus();
  </script>
</body>
</html>
