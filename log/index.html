<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Log — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Home</a>
        <a href="../clubs/"    data-nav="clubs">Book Clubs</a>
        <a href="../log/"      data-nav="log">My Log</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title">My Log</h1>

    <div class="card">
      <div class="book-entry">
        <div class="book-cover">🚀</div>
        <div class="book-info">
          <div class="book-title">Project Hail Mary</div>
          <div class="book-author">Andy Weir</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="fill-1" style="width:34%"></div>
          </div>
          <div class="progress-label" id="label-1">Page 145 of 476</div>
          <div class="progress-controls">
            <input class="page-input" type="number" value="145" min="1" max="9999" aria-label="Current page" data-fill="fill-1" data-label="label-1">
            <span class="page-sep">/</span>
            <input class="page-input page-total" type="number" value="476" min="1" max="9999" aria-label="Total pages" data-fill="fill-1" data-label="label-1">
            <button class="btn-update" onclick="updateProgress(this)">Update</button>
            <button class="btn-finished" onclick="markFinished(this)">Finished</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="book-entry">
        <div class="book-cover">🔥</div>
        <div class="book-info">
          <div class="book-title">A Fire Upon the Deep</div>
          <div class="book-author">Vernor Vinge</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="fill-2" style="width:12%"></div>
          </div>
          <div class="progress-label" id="label-2">Page 47 of 391</div>
          <div class="progress-controls">
            <input class="page-input" type="number" value="47" min="1" max="9999" aria-label="Current page" data-fill="fill-2" data-label="label-2">
            <span class="page-sep">/</span>
            <input class="page-input page-total" type="number" value="391" min="1" max="9999" aria-label="Total pages" data-fill="fill-2" data-label="label-2">
            <button class="btn-update" onclick="updateProgress(this)">Update</button>
            <button class="btn-finished" onclick="markFinished(this)">Finished</button>
          </div>
        </div>
      </div>
    </div>

    <div class="add-book-card card" id="add-book-card">
      <button class="add-book-toggle" id="add-book-toggle" onclick="toggleAddBook()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Start reading a new book
      </button>
      <div class="add-book-form" id="add-book-form" hidden>
        <div class="add-book-fields">
          <input class="add-book-input" type="text" placeholder="Title" id="new-title" autocomplete="off">
          <input class="add-book-input" type="text" placeholder="Author" id="new-author" autocomplete="off">
          <input class="add-book-input add-book-input-pages" type="number" placeholder="Total pages" id="new-pages" min="1" max="9999">
        </div>
        <div class="add-book-actions">
          <button class="btn-update" onclick="toggleAddBook()">Cancel</button>
          <button class="join-club-btn" onclick="addBook()">Add</button>
        </div>
      </div>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../log/" data-nav="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      My Log
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>
    function updateProgress(btn) {
      const controls = btn.closest('.progress-controls');
      const inputs   = controls.querySelectorAll('.page-input');
      const current  = Math.max(1, parseInt(inputs[0].value) || 1);
      const total    = Math.max(1, parseInt(inputs[1].value) || 1);
      const clamped  = Math.min(current, total);
      inputs[0].value = clamped;
      const pct = Math.round((clamped / total) * 100);
      document.getElementById(inputs[0].dataset.fill).style.width = pct + '%';
      document.getElementById(inputs[0].dataset.label).textContent = 'Page ' + clamped + ' of ' + total;
    }

    function markFinished(btn) {
      const card = btn.closest('.card');
      card.querySelector('.progress-bar-fill').style.width = '100%';
      card.querySelector('.progress-label').textContent = 'Finished today';
      btn.closest('.progress-controls').remove();
    }

    function toggleAddBook() {
      const form   = document.getElementById('add-book-form');
      const toggle = document.getElementById('add-book-toggle');
      const hidden = form.hidden;
      form.hidden   = !hidden;
      toggle.hidden =  hidden;
      if (!hidden) {
        document.getElementById('new-title').value = '';
        document.getElementById('new-author').value = '';
        document.getElementById('new-pages').value = '';
      }
    }

    function addBook() {
      const title  = document.getElementById('new-title').value.trim();
      const author = document.getElementById('new-author').value.trim();
      const pages  = parseInt(document.getElementById('new-pages').value) || 0;
      if (!title) { document.getElementById('new-title').focus(); return; }

      const id     = 'fill-' + Date.now();
      const lid    = 'label-' + Date.now();
      const card   = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="book-entry">
          <div class="book-cover">📖</div>
          <div class="book-info">
            <div class="book-title">${escHtml(title)}</div>
            ${author ? `<div class="book-author">${escHtml(author)}</div>` : ''}
            <div class="progress-bar-track"><div class="progress-bar-fill" id="${id}" style="width:0%"></div></div>
            <div class="progress-label" id="${lid}">Page 0${pages ? ' of ' + pages : ''}</div>
            <div class="progress-controls">
              <input class="page-input" type="number" value="0" min="1" max="9999" aria-label="Current page" data-fill="${id}" data-label="${lid}">
              <span class="page-sep">/</span>
              <input class="page-input page-total" type="number" value="${pages || ''}" min="1" max="9999" aria-label="Total pages" data-fill="${id}" data-label="${lid}">
              <button class="btn-update" onclick="updateProgress(this)">Update</button>
              <button class="btn-finished" onclick="markFinished(this)">Finished</button>
            </div>
          </div>
        </div>`;

      document.getElementById('add-book-card').before(card);
      toggleAddBook();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
