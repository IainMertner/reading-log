<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../clubs/"    data-nav="clubs">Clubs</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <a class="back-link" id="back-link" href="#" style="display:none">← Back</a>
    <h1 class="page-title">Profile</h1>

    <div class="profile-card card">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar-lg" id="profile-avatar"></div>
      </div>
      <div class="profile-name-wrap">
        <div class="profile-name" id="profile-name"></div>
      </div>
    </div>

    <div id="follow-action" hidden style="margin-bottom:.625rem">
      <button id="follow-btn" class="join-club-btn" style="width:100%">Follow</button>
    </div>

    <div class="profile-links" id="own-links" style="display:none">
      <a class="profile-link-row card" href="../friends/">
        <span class="profile-link-label">Following / Followers</span>
        <span class="profile-link-meta"><span id="following-count">—</span> · <span id="followers-count">—</span></span>
        <svg class="profile-link-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
    </div>

    <div class="profile-links" id="other-counts" style="display:none">
      <a class="profile-link-row card" id="other-counts-link" href="#">
        <span class="profile-link-label">Following / Followers</span>
        <span class="profile-link-meta"><span id="other-following-count">—</span> · <span id="other-followers-count">—</span></span>
        <svg class="profile-link-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
    </div>

    <div class="profile-links">
      <a class="profile-link-row card" id="library-link" href="../library/">
        <span class="profile-link-label">Library</span>
        <svg class="profile-link-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </a>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getFollowers, followUser, unfollowUser } from '../js/firebase.js';

    const { user, profile: myProfile } = await requireAuth();
    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    const isOwn       = !targetParam || targetParam === myProfile.username;

    try {
      if (isOwn) {
        document.getElementById('profile-avatar').textContent  = myProfile.username[0].toUpperCase();
        document.getElementById('profile-name').textContent    = myProfile.username;
        document.getElementById('following-count').textContent = (myProfile.following || myProfile.friends || []).length;
        document.getElementById('own-links').style.display = '';
        getFollowers(user.uid).then(f => {
          document.getElementById('followers-count').textContent = f.length;
        });
      } else {
        const backLink = document.getElementById('back-link');
        backLink.style.display = '';
        backLink.addEventListener('click', e => { e.preventDefault(); history.back(); });

        const target = await getProfileByUsername(targetParam);
        if (!target) {
          document.getElementById('profile-name').textContent = 'User not found.';
        } else {
          document.getElementById('profile-avatar').textContent = target.username[0].toUpperCase();
          document.getElementById('profile-name').textContent   = target.username;

          document.getElementById('other-following-count').textContent = (target.following || []).length;
          document.getElementById('other-counts-link').href = `../friends/?u=${encodeURIComponent(target.username)}`;
          document.getElementById('other-counts').style.display = '';
          document.getElementById('library-link').href = `../library/?u=${encodeURIComponent(target.username)}`;
          getFollowers(target.uid).then(f => {
            document.getElementById('other-followers-count').textContent = f.length;
          });

          const myFollowing = myProfile.following || myProfile.friends || [];
          let isFollowing   = myFollowing.includes(target.uid);

          const followAction = document.getElementById('follow-action');
          const followBtn    = document.getElementById('follow-btn');
          followAction.hidden   = false;
          followBtn.textContent = isFollowing ? 'Unfollow' : 'Follow';

          followBtn.addEventListener('click', async () => {
            followBtn.disabled = true;
            try {
              if (isFollowing) {
                await unfollowUser(user.uid, target.uid);
                isFollowing = false;
              } else {
                await followUser(user.uid, target.username);
                isFollowing = true;
              }
              followBtn.textContent = isFollowing ? 'Unfollow' : 'Follow';
            } finally {
              followBtn.disabled = false;
            }
          });
        }
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
</body>
</html>
