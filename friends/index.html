<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Following — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../clubs/"    data-nav="clubs">Clubs</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <a class="back-link" id="back-link" href="../profile/">← Profile</a>
    <h1 class="page-title" id="page-title">Following</h1>

    <div class="add-friend card" id="follow-form">
      <div class="add-friend-label">Follow someone</div>
      <div class="join-club-row">
        <input class="join-club-input" id="follow-input" type="text"
          placeholder="Their username" autocomplete="off" autocapitalize="none" spellcheck="false">
        <button class="join-club-btn" id="follow-btn">Follow</button>
      </div>
      <p class="auth-error" id="follow-error" hidden style="margin-top:.6rem;margin-bottom:0"></p>
      <p class="auth-hint"  id="follow-ok"    hidden style="margin-top:.4rem;color:var(--accent)"></p>
    </div>

    <p class="section-title">Following</p>
    <div id="following-list"></div>

    <p class="section-title" style="margin-top:1.5rem">Followers</p>
    <div id="followers-list"></div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getFollowers, followUser, unfollowUser, getProfileByUsername } from '../js/firebase.js';

    const { user } = await requireAuth();
    const followingList = document.getElementById('following-list');
    const followersList = document.getElementById('followers-list');

    // Support ?u=username to view another user's connections
    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    let viewUid = user.uid;

    if (targetParam) {
      const targetProfile = await getProfileByUsername(targetParam);
      if (targetProfile) {
        viewUid = targetProfile.uid;
        document.getElementById('page-title').textContent = `${targetProfile.username}'s Connections`;
        const back = document.getElementById('back-link');
        back.href = `../profile/?u=${encodeURIComponent(targetProfile.username)}`;
      }
      document.getElementById('follow-form').style.display = 'none';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      p.textContent = msg;
      container.appendChild(p);
    }

    function renderFollowing(profile) {
      const card = document.createElement('div');
      card.className   = 'card';
      card.dataset.uid = profile.uid;
      card.innerHTML = `<div class="friend-item">
        <div class="friend-avatar">${esc(profile.username[0].toUpperCase())}</div>
        <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${esc(profile.username)}</a>
        <button class="btn-danger btn-unfollow" style="margin-left:auto;font-size:.75rem;padding:.3rem .75rem">Unfollow</button>
      </div>`;
      card.querySelector('.btn-unfollow').addEventListener('click', async () => {
        await unfollowUser(user.uid, profile.uid);
        card.remove();
        if (!followingList.querySelector('.card')) {
          showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        }
      });
      return card;
    }

    function renderFollower(profile) {
      const card = document.createElement('div');
      card.className   = 'card';
      card.dataset.uid = profile.uid;
      card.innerHTML = `<div class="friend-item">
        <div class="friend-avatar">${esc(profile.username[0].toUpperCase())}</div>
        <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${esc(profile.username)}</a>
      </div>`;
      return card;
    }

    try {
      const [following, followers] = await Promise.all([
        getFollowing(viewUid),
        getFollowers(viewUid)
      ]);

      if (following.length === 0) showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
      else following.forEach(f => followingList.appendChild(renderFollowing(f)));

      if (followers.length === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
      else followers.forEach(f => followersList.appendChild(renderFollower(f)));
    } finally {
      document.body.classList.remove('auth-loading');
    }

    // ── Follow form ────────────────────────────────────────────────────────────
    const input   = document.getElementById('follow-input');
    const btn     = document.getElementById('follow-btn');
    const errorEl = document.getElementById('follow-error');
    const okEl    = document.getElementById('follow-ok');

    btn.addEventListener('click', async () => {
      const username = input.value.trim().toLowerCase();
      if (!username) return;

      errorEl.hidden  = true;
      okEl.hidden     = true;
      btn.disabled    = true;
      btn.textContent = 'Following…';

      try {
        const followed = await followUser(user.uid, username);

        document.getElementById('following-empty')?.remove();
        followingList.appendChild(renderFollowing(followed));

        okEl.textContent = `Now following ${followed.username}!`;
        okEl.hidden      = false;
        input.value      = '';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.hidden      = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Follow';
      }
    });

    input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
