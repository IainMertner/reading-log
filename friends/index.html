<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Friends — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Home</a>
        <a href="../clubs/"    data-nav="clubs">Book Clubs</a>
        <a href="../log/"      data-nav="log">My Log</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <a class="back-link" href="../profile/">← Profile</a>
    <h1 class="page-title">Friends</h1>

    <div id="friends-list">
      <!-- populated by script -->
    </div>

    <div class="add-friend card">
      <div class="add-friend-label">Add a friend</div>
      <div class="join-club-row">
        <input class="join-club-input" id="friend-input" type="text"
          placeholder="Their username" autocomplete="off" autocapitalize="none" spellcheck="false">
        <button class="join-club-btn" id="friend-btn">Add</button>
      </div>
      <p class="auth-error" id="friend-error" hidden style="margin-top:.6rem;margin-bottom:0"></p>
      <p class="auth-hint" id="friend-ok"    hidden style="margin-top:.4rem;color:var(--accent)"></p>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../log/" data-nav="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      My Log
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFriends, addFriend } from '../js/firebase.js';

    const { user } = await requireAuth();
    const list = document.getElementById('friends-list');

    function renderFriend(profile) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.uid = profile.uid;
      card.innerHTML = `<div class="friend-item">
        <div class="friend-avatar">${profile.username[0].toUpperCase()}</div>
        <div class="friend-name">${profile.username}</div>
      </div>`;
      return card;
    }

    function showEmpty() {
      const msg = document.createElement('p');
      msg.id = 'friends-empty';
      msg.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      msg.textContent = 'No friends yet. Add someone below!';
      list.appendChild(msg);
    }

    const friends = await getFriends(user.uid);
    if (friends.length === 0) {
      showEmpty();
    } else {
      friends.forEach(f => list.appendChild(renderFriend(f)));
    }

    document.body.classList.remove('auth-loading');

    // ── Add friend ──────────────────────────────────────────────────────────
    const input    = document.getElementById('friend-input');
    const btn      = document.getElementById('friend-btn');
    const errorEl  = document.getElementById('friend-error');
    const okEl     = document.getElementById('friend-ok');

    btn.addEventListener('click', async () => {
      const username = input.value.trim().toLowerCase();
      if (!username) return;

      errorEl.hidden = true;
      okEl.hidden    = true;
      btn.disabled   = true;
      btn.textContent = 'Adding…';

      try {
        const friend = await addFriend(user.uid, username);

        document.getElementById('friends-empty')?.remove();
        list.appendChild(renderFriend(friend));

        okEl.textContent = `${friend.username} added!`;
        okEl.hidden      = false;
        input.value      = '';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.hidden      = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Add';
      }
    });

    input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
